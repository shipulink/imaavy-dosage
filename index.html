<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imaavy IV Dose Calculator</title>
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    /* Minimal Tailwind-like styling subset */
    html, body, #root { height: 100%; }
    body { margin: 0; background:#0a0a0a; color:#e5e5e5; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, 'Apple Color Emoji','Segoe UI Emoji'; overflow:hidden; }
    .container { height:100%; display:flex; flex-direction:column; }
    .center { flex:1 1 auto; display:flex; align-items:top; justify-content:center; padding:24px; }
    .card { width:100%; max-width:640px; }
    .h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px 0; }
    .grid { display:grid; grid-template-columns: 1fr auto auto; gap:8px; align-items:center; margin-bottom: 16px; }
    .label { font-size: 14px; color:#d4d4d8; }
    .btn { padding:8px 12px; border-radius:16px; background:#1f2937; border:none; color:#e5e5e5; }
    .btn:hover { background:#374151; cursor:pointer; }
    .input { width:112px; text-align:right; padding:8px 12px; border-radius:16px; background:#111827; border:1px solid #1f2937; color:#e5e5e5; outline:none; }
    .input:focus { box-shadow: 0 0 0 2px #6366f1; }
    .table { width:100%; font-size:14px; background:#111827; border:1px solid #1f2937; border-radius:16px; overflow:hidden; }
    .tr { border-bottom:1px solid #1f2937; }
    .tdl { font-weight:600; padding:12px; color:#e5e7eb; vertical-align: top; }
    .tdr { padding:12px; color:#f3f4f6; vertical-align: top; }
    .footer { padding:10px 16px; text-align:center; font-size:12px; color:#9ca3af; border-top:1px solid #1f2937; }
    .notes {
      font-size: 0.85rem;
      color: #666;
      text-align: left;
      margin: 1em 0 0 0;
      padding-left: 0.5em;
      list-style-position: inside;
      line-height: 1.4;
    }
    .notes li {
      margin-bottom: 0.3em;
      font-weight: 400;
    }
    ul {
      margin:6px 0 0 0;
      padding-inline-start: 0;
    }
    .dose-type { display:flex; gap:8px; margin-bottom:16px; }
    .dose-radio { position:absolute; opacity:0; width:0; height:0; }
    .dose-pill {
      display:flex; align-items:center; gap:7px;
      padding:8px 14px; border-radius:16px;
      border:2px solid #1f2937;
      cursor:pointer; font-size:14px; color:#6b7280;
      user-select:none; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .dose-pill--selected { border-color:#6366f1; color:#e5e5e5; background:#1e1b4b; }
    .dose-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0;
      border:2px solid #4b5563; transition: background 0.15s, border-color 0.15s;
    }
    .dose-pill--selected .dose-dot { background:#6366f1; border-color:#6366f1; }
  </style>
</head>
<body>
  <div id="root" class="container"></div>

  <!-- React + Babel (for quick deploy without build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Constants
    const LOADING_MG_PER_KG = 30;
    const MAINTENANCE_MG_PER_KG = 15;
    const CONC_MG_PER_ML = 185;
    const LARGE_VIAL_MG = 1200;
    const LARGE_VIAL_ML = LARGE_VIAL_MG / CONC_MG_PER_ML;
    const SMALL_VIAL_MG = 300;
    const SMALL_VIAL_ML = SMALL_VIAL_MG / CONC_MG_PER_ML;
    const NS_BAG_ML = 100;
    const FINAL_VOL_ML = 125;

    const formatMl = (n) => (Number.isFinite(n) ? n.toFixed(1) : "—");
    const formatInt = (n) => (Number.isFinite(n) ? Math.round(n).toString() : "—");

    function clampKg(v) {
      const x = Math.round(v);
      if (!Number.isFinite(x)) return null;
      return Math.max(1, Math.min(300, x));
    }

    function Row({ label, value }) {
      return (
        <tr className="tr">
          <td className="tdl">{label}</td>
          <td className="tdr">{value}</td>
        </tr>
      );
    }

    function App() {
      const [kg, setKg] = useState(null);
      const [input, setInput] = useState("");
      const [doseType, setDoseType] = useState("maintenance");
      const results = useMemo(() => {
        if (kg === null) return null;
        const mgPerKg = doseType === "loading" ? LOADING_MG_PER_KG : MAINTENANCE_MG_PER_KG;
        const doseMg = kg * mgPerKg;
        const volMl = doseMg / CONC_MG_PER_ML;

        const fullLargeVials = Math.floor(doseMg / LARGE_VIAL_MG);
        const remainder = doseMg - fullLargeVials * LARGE_VIAL_MG;

        let largeVials, smallVials, lastVialMl, wasteMg;
        if (remainder === 0) {
          largeVials = fullLargeVials;
          smallVials = 0;
          lastVialMl = 0;
          wasteMg = 0;
        } else if (remainder > SMALL_VIAL_MG * 3) {
          // 4+ small vials would equal or exceed 1 large vial — use partial large instead
          largeVials = fullLargeVials + 1;
          smallVials = 0;
          lastVialMl = remainder / CONC_MG_PER_ML;
          wasteMg = LARGE_VIAL_MG - remainder;
        } else {
          largeVials = fullLargeVials;
          smallVials = Math.ceil(remainder / SMALL_VIAL_MG);
          const lastSmallUsedMg = remainder - (smallVials - 1) * SMALL_VIAL_MG;
          lastVialMl = lastSmallUsedMg / CONC_MG_PER_ML;
          wasteMg = SMALL_VIAL_MG - lastSmallUsedMg;
        }

        const removeNsMl = Math.max(0, volMl - (FINAL_VOL_ML - NS_BAG_ML));

        const wasteMl = wasteMg / CONC_MG_PER_ML;
        return { doseMg, volMl, largeVials, smallVials, lastVialMl, wasteMg, wasteMl, removeNsMl };
      }, [kg, doseType]);

      return (
        <div className="container">
          <div className="center">
            <div className="card">
              <h1 className="h1">Imaavy IV Dose Calculator</h1>
              <div className="dose-type">
                {[["maintenance", "Maintenance"], ["loading", "Loading"]].map(([value, label]) => (
                  <label key={value} className={`dose-pill${doseType === value ? " dose-pill--selected" : ""}`}>
                    <input type="radio" name="doseType" value={value} checked={doseType === value}
                      onChange={() => setDoseType(value)} className="dose-radio" />
                    <span className="dose-dot" />
                    {label}
                  </label>
                ))}
              </div>
              <div className="grid">
                <label htmlFor="kg" className="label">Patient mass (kg)</label>
                <div style={{gridColumn: "span 2", display:"flex", gap:8, justifyContent:"end"}}>
                  <input id="kg" className="input" type="text" inputMode="numeric" pattern="[0-9]*"
                    value={input}
                    onChange={(e) => {
                      const val = e.target.value;
                      if (val === "" || /^[0-9]+$/.test(val)) {
                        setInput(val);
                        if (val === "") setKg(null);
                        else setKg(clampKg(parseInt(val, 10)));
                      }
                    }}
                  />
                  <button type="button" className="btn" aria-label="Clear input"
                    onClick={() => {
                      const input = document.getElementById("kg");
                      setKg(null)
                      setInput("");
                      input.focus();
                    }}>clear</button>
                </div>
              </div>

              <table className="table">
                <tbody>
                  <Row label="Imaavy dose" value={results ? `${formatInt(results.doseMg)} mg` : "—"} />
                  <Row label="Imaavy volume" value={results ? `${formatMl(results.volMl)} mL` : "—"} />
                  <Row label="1200 mg vials" value={results ? formatInt(results.largeVials) : "—"} />
                  <Row label="300 mg vials" value={results ? formatInt(results.smallVials) : "—"} />
                  <Row label="volume from last vial" value={results && results.wasteMg > 0 ? `${formatMl(results.lastVialMl)} mL` : "—"} />
                  <Row label="waste mass" value={results && results.wasteMg > 0 ? `${formatInt(results.wasteMg)} mg` : "—"} />
                  <Row label="waste volume" value={results && results.wasteMl > 0 ? `${formatMl(results.wasteMl)} mL` : "—"} />
                  <Row label="NS to remove" value={results ? `${formatMl(results.removeNsMl)} mL` : "—"} />
                </tbody>
              </table>
              <div className="notes">
                <ul>
                  <li>Loading dose: 30 mg/kg</li>
                  <li>Maintenance dose: 15 mg/kg</li>
                  <li>1200 mg vials @ 185 mg/mL (6.5 mL)</li>
                  <li>300 mg vials @ 185 mg/mL (1.62 mL)</li>
                  <li>Start NS = 100 mL</li>
                  <li>Final NS = 125 mL</li>
                </ul>
              </div>
            </div>
          </div>

          <div className="footer" aria-hidden="true">
            Not medical advice. Use at your own risk.<br/>
            Imaavy is a registered trademark of Johnson & Johnson; no affiliation.
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
